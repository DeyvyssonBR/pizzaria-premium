name = "pizzaria-premium-mp"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Cloudflare Worker que hospeda:
#  - POST /api/mp/create-pix  → cria pagamento Pix server-side (token em secret)
#  - POST /api/mp/webhook     → recebe notificações IPN/MP, valida assinatura
#  - GET  /api/mp/payment-status?ref=...  → consulta KV pro front polling
#
# Variáveis / secrets (Cloudflare Workers → Settings → Variables/Secrets):
#   Preferidos (alinhar com a app Node):
#     MERCADOPAGO_ACCESS_TOKEN   Access Token (TEST-... ou APP_USR-...)
#     MERCADOPAGO_ENV            sandbox | production
#     MERCADOPAGO_WEBHOOK_SECRET Segredo do webhook no painel MP
#   Aliases legados ainda lidos pelo worker/src/index.js:
#     MP_ACCESS_TOKEN, MP_ENV, MP_WEBHOOK_SECRET
#   ALLOWED_ORIGINS     opcional      CSV de origins CORS
#
# Bindings KV (Workers → KV → Create namespace):
#   MP_TX               obrigatório   Namespace para status dos pagamentos
#
# Secrets (NUNCA comitar):
#   wrangler secret put MERCADOPAGO_ACCESS_TOKEN
#   # ou: wrangler secret put MP_ACCESS_TOKEN
#   wrangler secret put MP_WEBHOOK_SECRET
#
# Deploy:
#   cd worker
#   npm install
#   wrangler kv:namespace create MP_TX
#   wrangler secret put MP_ACCESS_TOKEN
#   wrangler secret put MP_WEBHOOK_SECRET
#   npm run deploy

[vars]
ALLOWED_ORIGINS = "https://deyvyssonbr.github.io,https://pizzaria-premium.vercel.app"

# Substitua o id pelo que `wrangler kv:namespace create MP_TX` devolveu
# (rode de novo com `--preview` para o environment preview).
# [[kv_namespaces]]
# binding = "MP_TX"
# id = "REPLACE_WITH_REAL_ID"
# preview_id = "REPLACE_WITH_PREVIEW_ID"
