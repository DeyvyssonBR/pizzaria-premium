version: "3.8"

services:
  pizzaria-premium:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pizzaria-premium
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
